<header class="header">

  <!-- LOGO + NOMBRE -->
  <a routerLink="/" class="logo-container">
    <img src="assets/logo/logo2.jpg" alt="Logo" class="logo">
    <div class="brand-text">
      <span class="brand-name">Mueblería</span>
      <span class="brand-surname">Casa Giovanni</span>
    </div>
  </a>

    <a routerLink="/"        routerLinkActive="activo" [routerLinkActiveOptions]="{exact:true}" (click)="cerrarMenu()">Inicio</a>
    <a routerLink="/catalogo" routerLinkActive="activo" (click)="cerrarMenu()">Catálogo</a>
    <a routerLink="/nosotros" routerLinkActive="activo" (click)="cerrarMenu()">Nosotros</a>
    <a routerLink="/contacto" routerLinkActive="activo" (click)="cerrarMenu()">Contacto</a>
